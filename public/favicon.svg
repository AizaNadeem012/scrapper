<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Web/Spider design for scraper -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Web threads -->
  <line x1="50" y1="10" x2="50" y2="90" stroke="url(#grad1)" stroke-width="1.5" opacity="0.6"/>
  <line x1="10" y1="50" x2="90" y2="50" stroke="url(#grad1)" stroke-width="1.5" opacity="0.6"/>
  <line x1="20" y1="20" x2="80" y2="80" stroke="url(#grad1)" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="20" x2="20" y2="80" stroke="url(#grad1)" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Concentric circles for web -->
  <circle cx="50" cy="50" r="35" stroke="url(#grad1)" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="50" cy="50" r="25" stroke="url(#grad1)" stroke-width="1" fill="none" opacity="0.5"/>
  <circle cx="50" cy="50" r="15" stroke="url(#grad1)" stroke-width="1" fill="none" opacity="0.6"/>
  
  <!-- Spider/crawler body (center) -->
  <circle cx="50" cy="50" r="8" fill="url(#grad1)"/>
  
  <!-- Spider legs -->
  <line x1="50" y1="50" x2="30" y2="35" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="70" y2="35" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="30" y2="65" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="70" y2="65" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Data points on web -->
  <circle cx="50" cy="20" r="3" fill="#3b82f6"/>
  <circle cx="80" cy="50" r="3" fill="#3b82f6"/>
  <circle cx="50" cy="80" r="3" fill="#3b82f6"/>
  <circle cx="20" cy="50" r="3" fill="#3b82f6"/>
</svg>